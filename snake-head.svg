<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="headGrad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#8dffc0"/>
      <stop offset="60%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#20a85c"/>
    </radialGradient>
  </defs>

  <!-- head shape: rounded at the back, tapered into a smooth nose on the right
       (symmetric top-to-bottom so it still looks right after rotating) -->
  <path d="M8 12 L38 12 Q58 12 58 32 Q58 52 38 52 L8 52
           Q4 52 4 48 L4 16 Q4 12 8 12 Z"
        fill="url(#headGrad)" stroke="#15803d" stroke-width="1.5"/>

  <!-- eyes -->
  <circle cx="32" cy="23" r="6" fill="#ffffff"/>
  <circle cx="32" cy="41" r="6" fill="#ffffff"/>
  <circle cx="34" cy="23" r="3" fill="#0d0d0d"/>
  <circle cx="34" cy="41" r="3" fill="#0d0d0d"/>
  <circle cx="32.5" cy="21.5" r="1.1" fill="#ffffff" opacity="0.85"/>
  <circle cx="32.5" cy="39.5" r="1.1" fill="#ffffff" opacity="0.85"/>

  <!-- nostrils -->
  <circle cx="50" cy="26" r="1.3" fill="#146534"/>
  <circle cx="50" cy="38" r="1.3" fill="#146534"/>

  <!-- forked tongue -->
  <path d="M58 32 L63 32 M63 32 L64 28 M63 32 L64 36"
        stroke="#ff4d4d" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
