<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#0d0d0d"/>

  <!-- snake body (curled, made of rounded blocks like the game's cells) -->
  <rect x="12" y="16" width="12" height="12" rx="4" fill="#4ade80"/>
  <rect x="12" y="28" width="12" height="12" rx="4" fill="#4ade80"/>
  <rect x="12" y="40" width="12" height="12" rx="4" fill="#4ade80"/>
  <rect x="24" y="40" width="12" height="12" rx="4" fill="#4ade80"/>

  <!-- snake head (brighter, glowing) -->
  <rect x="36" y="40" width="12" height="12" rx="4" fill="#ffffff"/>
  <circle cx="40.5" cy="44.5" r="1.3" fill="#0d0d0d"/>
  <circle cx="44.5" cy="44.5" r="1.3" fill="#0d0d0d"/>

  <!-- food -->
  <circle cx="46" cy="18" r="7" fill="#ff4d4d"/>
</svg>
